# Lab 10: Nginx proxy_pass configuration
# Place this file in /etc/nginx/sites-available/lab10
# Then: sudo ln -s /etc/nginx/sites-available/lab10 /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8000;
    server_name localhost;

    # Serve static HTML at root
    root /var/www/html;
    index my_site.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy all /api/ requests to the Python backend on port 5000
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        # Pass original client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
